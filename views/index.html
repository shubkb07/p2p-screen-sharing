<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Screen Share</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="home-container">
    <h1>Screen Share</h1>
    <p class="subtitle">Share your screen instantly, or join with a meeting code.</p>

    <div class="home-card">
      <button id="startBtn" class="btn btn-primary">Create a share room</button>

      <div class="divider"><span>OR</span></div>

      <label for="codeInput" class="field-label">Enter meeting code</label>
      <input
        id="codeInput"
        type="text"
        maxlength="12"
        placeholder="ABCD2345"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="joinBtn" class="btn btn-secondary">Join a screen</button>
      <p class="privacy-note">🔒 Direct WebRTC connection with encrypted media</p>
    </div>
  </div>

  <script src="/js/home.js"></script>
</body>
</html>
