<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sharing Screen</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body class="share-body">
  <div class="share-container">
    <div class="top-bar">
      <div class="code-display">
        <span class="code-label">Meeting Code</span>
        <span id="codeText" class="code-value"></span>
      </div>
      <div class="top-actions"><span id="viewerCount">0 viewers</span><button id="copyBtn" class="btn btn-outline">Copy viewer link</button></div>
    </div>

    <div class="video-wrapper" id="videoWrapper">
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="black-overlay" id="blackOverlay">
        <div class="share-prompt"><p>Choose what you want viewers to see</p><label><input id="shareAudio" type="checkbox"> Share system audio (when supported)</label><button id="resumeShareBtn" class="btn btn-primary">Choose screen</button></div>
      </div>
    </div>

    <div class="controls">
      <span id="shareStatus" class="connection-status">Connecting…</span>
      <button id="stopBtn" class="btn btn-danger" disabled>Stop sharing</button>
    </div>
  </div>

  <script src="/js/share.js"></script>
</body>
</html>
