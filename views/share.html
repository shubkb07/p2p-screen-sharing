<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sharing Screen</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body class="share-body">
  <div class="share-container">
    <div class="top-bar">
      <div class="code-display">
        <span class="code-label">Meeting Code</span>
        <span id="codeText" class="code-value"></span>
      </div>
      <button id="copyBtn" class="btn btn-outline">Copy Link</button>
    </div>

    <div class="video-wrapper" id="videoWrapper">
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="black-overlay" id="blackOverlay">
        <button id="resumeShareBtn" class="btn btn-primary">Share Screen</button>
      </div>
    </div>

    <div class="controls">
      <button id="stopBtn" class="btn btn-danger">Stop Share</button>
    </div>
  </div>

  <script src="/js/share.js"></script>
</body>
</html>
